<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether Archive: Mobile Ritual</title>
    <style>
        :root { --mana: #00f3ff; --hp: #ff4757; }
        body { margin: 0; background: #050508; color: #fff; font-family: sans-serif; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        #ui { position: absolute; bottom: 20px; width: 100%; text-align: center; }
        .btn { padding: 15px; background: rgba(0,243,255,0.2); border: 1px solid var(--mana); color: white; border-radius: 8px; width: 80%; margin: 5px; }
        #stats { font-family: monospace; color: var(--mana); margin-bottom: 10px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="stats">CHAOS: 0.00 | ENEMY HP: 100</div>
        <div id="narrative" style="padding: 10px; font-size: 14px;">The Archive is dormant. Tap Boot to begin.</div>
        <div id="quiz-area"></div>
        <button class="btn" id="boot-btn" onclick="initGame()">BOOT SYSTEMS</button>
    </div>

    <script>
        const API_KEY = "AIzaSyB2UC5g2GuwAy-88gZm5gCfd1XrHSl-aVs";
        let chaos = 0;
        let enemyHp = 100;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 1. THE BRAIN (The "JS Engine" replacing Rust)
        function updatePhysics(event) {
            let x = event.acceleration.x || 0;
            let y = event.acceleration.y || 0;
            let z = event.acceleration.z || 0;
            let mag = Math.sqrt(x*x + y*y + z*z);
            chaos = (chaos * 0.9) + (mag * 0.1); // Smooths the vibration data
            document.getElementById('stats').innerText = `CHAOS: ${chaos.toFixed(2)} | ENEMY HP: ${enemyHp}`;
        }

        async function initGame() {
            // Request sensor permission for mobile
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                await DeviceMotionEvent.requestPermission();
            }
            window.addEventListener('devicemotion', updatePhysics);
            document.getElementById('boot-btn').style.display = 'none';
            document.getElementById('narrative').innerText = "Ritual connected. Fetching trial...";
            getNewQuestion();
            animate();
        }

        // 2. THE AI (Gemini DM)
        async function getNewQuestion() {
            const prompt = `Topic: Computer Science. Chaos Level: ${chaos}. Generate a JSON: {"q":"question", "o":["opt1", "opt2"], "a":0}`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const quiz = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
                displayQuiz(quiz);
            } catch (e) {
                console.error("AI Error", e);
            }
        }

        function displayQuiz(quiz) {
            const area = document.getElementById('quiz-area');
            area.innerHTML = `<h3>${quiz.q}</h3>`;
            quiz.o.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = opt;
                b.onclick = () => {
                    if(i === quiz.a) {
                        let damage = Math.floor(10 + (chaos * 5));
                        enemyHp -= damage;
                        alert(`CRITICAL HIT! Dealt ${damage} damage!`);
                    } else {
                        alert("The Archive rejects your answer.");
                    }
                    getNewQuestion();
                };
                area.appendChild(b);
            });
        }

        // 3. THE GRAPHICS (Character Loop)
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Draw a simple glowing "Aether" core
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/3, 50 + chaos*5, 0, Math.PI*2);
            ctx.fillStyle = `rgba(0, 243, 255, ${0.2 + (chaos/20)})`;
            ctx.fill();
            ctx.shadowBlur = 20 + chaos*10;
            ctx.shadowColor = "#00f3ff";
            
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
